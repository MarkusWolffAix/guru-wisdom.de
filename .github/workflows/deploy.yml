name: CI/CD Pipeline Guru-Wisdom

# Trigger the workflow on every push to the main branch
on:
  push:
    branches: [ main ]

jobs:
  # --- STAGE 1: DEPLOY TO TEST SERVER ---
  # Automatic deployment to your test server via Jump Server
  deploy-test:
    name: Deploy to Staging (Test Server)
    runs-on: ubuntu-latest
    steps:
      - name: Remote SSH Deployment (Staging) via Jump Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SERVER_IP }}
          username: git
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.JUMP_SERVER_IP }}
          proxy_username: git
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # Stops execution immediately if any command fails
            cd /opt/guru-wisdom.de
            
            git pull origin main
            
            echo "APP_ENV=test" > .env
            chmod 600 .env
            docker compose  up -d --build app
            docker image prune -f

  # --- STAGE 2: DEPLOY TO PRODUCTION ---
  # Waits for staging and manual approval
  deploy-prod:
    name: Deploy to Production
    needs: [deploy-test]
    runs-on: ubuntu-latest
    
    # Enable Manual Approval Gate
    environment:
      name: production
      url: https://guru-wisdom.de

    steps:
      - name: Remote SSH Deployment (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: git
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.JUMP_SERVER_IP }}
          proxy_username: git
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/guru-wisdom.de
            
            git pull origin main
            
            echo "APP_ENV=prod" > .env
            chmod 600 .env
            docker compose  up -d --build app
            docker image prune -f

  # --- STAGE 3: DEPLOY TO REPLICATION SERVER ---
  # Runs parallel to Production after the same manual approval
  deploy-replica:
    name: Deploy to Replication
    needs: [deploy-test]
    runs-on: ubuntu-latest
    
    # Uses the same environment gate, so one click approves both Production and Replication
    environment:
      name: production

    steps:
      - name: Remote SSH Deployment (Replication)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REPLICA_SERVER_IP }} # Make sure to add this secret!
          username: git
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.JUMP_SERVER_IP }}
          proxy_username: git
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/guru-wisdom.de
            
            git pull origin main
            
            echo "APP_ENV=prod" > .env # Adjust this if replica needs a different env variable
            chmod 600 .env
            
            # Make sure you have a docker-compose.replica.yml if it differs from prod
            docker compose  up -d --build app
            docker image prune -f
    
