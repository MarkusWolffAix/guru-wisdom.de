name: CI/CD Pipeline Guru-Wisdom

# Trigger the workflow on every push to the main branch
on:
  push:
    branches: [ main ]

jobs:
  # --- STAGE 0: RUN TESTS (SICHERHEITSNETZ) ---
  run-tests:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5' 
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit tests/

  # --- STAGE 1: DEPLOY TO TEST SERVER ---
  deploy-test:
    name: Deploy to Staging Nuenberg (Test Server)
    needs: [run-tests] # WICHTIG: Wartet auf erfolgreiche Tests!
    runs-on: ubuntu-latest
    steps:
      - name: Remote SSH Deployment (Staging) via Jump Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SERVER_IP }}
          username: git
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.JUMP_SERVER_IP }}
          proxy_username: git
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # Stops execution immediately if any command fails
            cd /opt/guru-wisdom.de
            
            git pull origin main
            
            echo "APP_ENV=test" > .env
            chmod 600 .env
            docker compose up -d --build app
            docker compose exec app rm -rf runtime/cache/*
            docker image prune -f

  # --- STAGE 2: DEPLOY TO PRODUCTION ---
  deploy-prod:
    name: Deploy to Production Nuernberg
    needs: [deploy-test]
    runs-on: ubuntu-latest
    
    # Enable Manual Approval Gate
    environment:
      name: production
      url: https://guru-wisdom.de

    steps:
      - name: Remote SSH Deployment Nürnberg (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_NBG1_SERVER_IP }}
          username: git
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.JUMP_SERVER_IP }}
          proxy_username: git
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/guru-wisdom.de
            
            git pull origin main
            
            echo "APP_ENV=prod" > .env
            chmod 600 .env
            docker compose up -d --build app
            docker compose exec app rm -rf runtime/cache/*
            docker image prune -f

  # --- STAGE 3: DEPLOY TO REPLICATION SERVER ---
  deploy-replica:
    name: Deploy to Producton Helsinki
    needs: [deploy-test]
    runs-on: ubuntu-latest
    
    # Uses the same environment gate, so one click approves both Production and Replication
    environment:
      name: production

    steps:
      - name: Remote SSH Deployment (Replication)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HEL1_SERVER_IP }}
          username: git
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.JUMP_SERVER_IP }}
          proxy_username: git
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/guru-wisdom.de
            
            git pull origin main
            
            echo "APP_ENV=prod" > .env
            chmod 600 .env
            
            docker compose up -d --build app
            docker compose exec app rm -rf runtime/cache/*
            docker image prune -f