name: guruwisdom-test
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod       
    ports:
      - "80:80"          
    environment:
      - SERVER_NAME=:80
      - APP_ENV=test
    restart: unless-stopped
    tty: true
    volumes:
      - app_public_assets:/app/public/assets
      - app_runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_public_assets:
  app_runtime:
  caddy_data:
  caddy_config: